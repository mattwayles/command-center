<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c0304d"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Card panel -->
  <rect x="140" y="180" width="744" height="664" rx="48" fill="#16213e" filter="url(#shadow)"/>

  <!-- Top accent bar -->
  <rect x="140" y="180" width="744" height="8" rx="4" fill="#e94560" opacity="0.9"/>

  <!-- Command hub group, centered on the card at (512, 512) -->
  <!-- Soft hub glow -->
  <circle cx="512" cy="512" r="190" fill="url(#hubGlow)"/>

  <!-- Connector links from hub to the three satellite nodes -->
  <g stroke="#eaeaea" stroke-opacity="0.28" stroke-width="7" stroke-linecap="round">
    <line x1="512" y1="512" x2="512" y2="312"/>
    <line x1="512" y1="512" x2="339" y2="612"/>
    <line x1="512" y1="512" x2="685" y2="612"/>
  </g>

  <!-- Concentric command rings -->
  <circle cx="512" cy="512" r="132" fill="none" stroke="#eaeaea" stroke-opacity="0.12" stroke-width="4"/>
  <circle cx="512" cy="512" r="200" fill="none" stroke="#e94560" stroke-opacity="0.22" stroke-width="4"/>

  <!-- Satellite nodes (dark outline cuts them cleanly out of the rings) -->
  <!-- Top — pending (green) -->
  <circle cx="512" cy="312" r="34" fill="#6bcb77" stroke="#16213e" stroke-width="7"/>
  <circle cx="503" cy="303" r="11" fill="#fff" fill-opacity="0.8"/>
  <!-- Lower-left — in-progress (yellow) -->
  <circle cx="339" cy="612" r="34" fill="#ffd93d" stroke="#16213e" stroke-width="7"/>
  <circle cx="330" cy="603" r="11" fill="#fff" fill-opacity="0.8"/>
  <!-- Lower-right — alert (red) -->
  <circle cx="685" cy="612" r="34" fill="#ff6b6b" stroke="#16213e" stroke-width="7"/>
  <circle cx="676" cy="603" r="11" fill="#fff" fill-opacity="0.8"/>

  <!-- Central command node -->
  <circle cx="512" cy="512" r="92" fill="none" stroke="#e94560" stroke-opacity="0.4" stroke-width="8"/>
  <circle cx="512" cy="512" r="68" fill="url(#badge)"/>
  <circle cx="512" cy="512" r="27" fill="#fff" fill-opacity="0.92"/>
</svg>
